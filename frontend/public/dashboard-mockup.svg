        <rect x="0" y="24" width="24" height="28" rx="4"/>
        <rect x="42" y="8" width="24" height="44" rx="4"/>
        <rect x="84" y="18" width="24" height="34" rx="4"/>
        <rect x="126" y="-6" width="24" height="58" rx="4"/>
        <rect x="168" y="12" width="24" height="40" rx="4"/>
        <rect x="210" y="-18" width="24" height="70" rx="4"/>
        <rect x="252" y="2" width="24" height="50" rx="4"/>

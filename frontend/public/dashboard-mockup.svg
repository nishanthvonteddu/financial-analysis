      <text x="76" y="326" fill="#aab2bd" font-size="16" font-weight="700">Revenue</text>
      <text x="76" y="390" fill="#aab2bd" font-size="16" font-weight="700">Expenses</text>
      <text x="76" y="454" fill="#aab2bd" font-size="16" font-weight="700">Reports</text>
      <text x="76" y="518" fill="#aab2bd" font-size="16" font-weight="700">Forecasts</text>
      <text x="76" y="582" fill="#aab2bd" font-size="16" font-weight="700">Recurring costs</text>


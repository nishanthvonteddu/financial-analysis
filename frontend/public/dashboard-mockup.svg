      <text x="1158" y="482" fill="#8f99a5" font-size="14">Donut chart grouped by operating category.</text>
      <circle cx="1328" cy="594" r="102" fill="none" stroke="#252c35" stroke-width="34"/>
      <path d="M1328 492A102 102 0 0 1 1425 625" fill="none" stroke="#f8fafc" stroke-width="34" stroke-linecap="round"/>
      <path d="M1422 636A102 102 0 0 1 1268 676" fill="none" stroke="#aeb6c1" stroke-width="34" stroke-linecap="round"/>
      <path d="M1256 668A102 102 0 0 1 1318 492" fill="none" stroke="#5d6672" stroke-width="34" stroke-linecap="round"/>
      <text x="1290" y="586" fill="#f8fafc" font-size="34" font-weight="900">62%</text>
      <text x="1285" y="616" fill="#8f99a5" font-size="13" font-weight="700">expenses</text>

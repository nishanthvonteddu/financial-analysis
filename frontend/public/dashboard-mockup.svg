<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Professional financial analysis dashboard</title>
  <desc id="desc">A monochrome flat user interface with revenue, net profit, charts, and expense analysis.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#151a20"/>
      <stop offset="1" stop-color="#0f1318"/>
    </linearGradient>
    <linearGradient id="soft" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#d8dde4"/>
    </linearGradient>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity=".26"/>
    </filter>
    <clipPath id="clip">
      <rect width="1600" height="1000" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1600" height="1000" fill="#090b0e"/>

    <rect x="0" y="0" width="272" height="1000" fill="#11161c"/>
    <rect x="272" y="0" width="1328" height="1000" fill="#0b0e12"/>
    <path d="M320 160H1536" stroke="#252c35" stroke-width="1"/>
    <path d="M272 0V1000" stroke="#2a313b" stroke-width="1"/>

    <g font-family="Inter, Arial, sans-serif">
      <circle cx="66" cy="70" r="28" fill="#f8fafc"/>
      <path d="M57 80V64M67 80V54M77 80V61" stroke="#0b0e12" stroke-width="5" stroke-linecap="round"/>
      <text x="108" y="64" fill="#f8fafc" font-size="28" font-weight="800">FinSight</text>
      <text x="108" y="92" fill="#8b949f" font-size="13" font-weight="600" letter-spacing="2">FINANCIAL ANALYSIS</text>

      <rect x="36" y="154" width="200" height="52" rx="14" fill="#f8fafc"/>
      <text x="76" y="187" fill="#0b0e12" font-size="16" font-weight="800">Overview</text>

        <text x="1186" y="728" fill="#aab2bd">Operations 42%</text>
        <rect x="1322" y="716" width="14" height="14" rx="4" fill="#aeb6c1"/>
        <text x="1348" y="728" fill="#aab2bd">Vendors 35%</text>
        <rect x="1160" y="748" width="14" height="14" rx="4" fill="#5d6672"/>
        <text x="1186" y="760" fill="#aab2bd">Recurring 23%</text>
